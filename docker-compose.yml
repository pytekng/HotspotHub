services:
  postgres:
    image: postgres:16
    container_name: hotspothub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotspothub
      POSTGRES_USER: hotspothub
      POSTGRES_PASSWORD: hotspothub123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hotspothub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
